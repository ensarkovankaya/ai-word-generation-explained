<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How AI Predicts the Next Word</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  h1 {
    margin-top: 40px;
    font-size: 1.8rem;
    color: #e6edf3;
    letter-spacing: 0.5px;
  }
  #board {
    position: relative;
    margin-top: 40px;
    width: 800px;
    min-height: 520px;
  }
  #lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #lines line {
    stroke: #21262d;
    stroke-width: 2;
    transition: stroke 0.4s, stroke-width 0.4s;
  }
  #lines line.active {
    stroke: #4fc3f7;
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px rgba(79,195,247,0.5));
  }
  .row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }
  .node {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 1.05rem;
    opacity: 0.3;
    transition: opacity 0.4s, transform 0.4s, box-shadow 0.4s, border-color 0.4s;
    position: relative;
    white-space: nowrap;
  }
  .node.active {
    opacity: 1;
    transform: scale(1.12);
    border-color: #4fc3f7;
    box-shadow: 0 0 16px rgba(79,195,247,0.35), 0 0 4px rgba(79,195,247,0.2);
    color: #fff;
  }
  .rng {
    position: absolute;
    top: -18px;
    right: -8px;
    font-size: 0.7rem;
    color: #4fc3f7;
    opacity: 0;
    transition: opacity 0.4s;
    font-family: monospace;
  }
  .rng.show { opacity: 1; }
  #ball {
    position: absolute;
    width: 14px; height: 14px;
    background: #4fc3f7;
    border-radius: 50%;
    box-shadow: 0 0 12px #4fc3f7, 0 0 24px rgba(79,195,247,0.4);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #sentence {
    margin-top: 8px;
    font-size: 1.4rem;
    color: #4fc3f7;
    opacity: 0;
    transition: opacity 0.8s;
    text-align: center;
    text-shadow: 0 0 12px rgba(79,195,247,0.4);
  }
  #sentence.show { opacity: 1; }
  #restart {
    margin-top: 24px;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    opacity: 0;
    transition: opacity 0.5s, border-color 0.3s;
  }
  #restart:hover { border-color: #4fc3f7; color: #fff; }
  #restart.show { opacity: 1; }
  #speed-control {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
    color: #8b949e;
  }
  #speed-control label { white-space: nowrap; }
  #speed-slider {
    -webkit-appearance: none;
    width: 160px;
    height: 4px;
    background: #30363d;
    border-radius: 2px;
    outline: none;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #4fc3f7;
    border-radius: 50%;
    cursor: pointer;
  }
  #speed-slider::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #4fc3f7;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  #speed-val { font-family: monospace; color: #c9d1d9; min-width: 32px; }
  .node.root {
    cursor: pointer;
    user-select: none;
  }
  .node.root:hover {
    border-color: #4fc3f7;
    opacity: 0.6;
  }
  .node.root.active:hover { opacity: 1; }
  #word-picker {
    position: absolute;
    z-index: 20;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 6px 0;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #word-picker.show { display: block; }
  .picker-item {
    padding: 8px 20px;
    cursor: pointer;
    font-size: 1rem;
    color: #c9d1d9;
    transition: background 0.15s, color 0.15s;
  }
  .picker-item:hover {
    background: #21262d;
    color: #4fc3f7;
  }
  .picker-item.selected {
    color: #4fc3f7;
    font-weight: 600;
  }
</style>
</head>
<body>
<h1>How AI Predicts the Next Word</h1>
<div id="speed-control">
  <label for="speed-slider">Speed</label>
  <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1">
  <span id="speed-val">1x</span>
</div>
<div id="board">
  <svg id="lines"></svg>
  <div id="ball"></div>
  <div id="word-picker"></div>
</div>
<div id="sentence"></div>
<button id="restart">Drop again</button>

<script>
const wordGroups = {
  "The": [
    ["The"],
    ["cat", "world"],
    ["sat", "sleeps", "is"],
    ["on", "quietly", "always", "changing"],
    ["the", "now", "forever", "rapidly", "mat"]
  ],
  "I": [
    ["I"],
    ["want", "think"],
    ["to", "about", "that"],
    ["learn", "explore", "this", "something"],
    ["more", "deeply", "works", "new", "today"]
  ],
  "She": [
    ["She"],
    ["can", "will"],
    ["build", "never", "create"],
    ["amazing", "stop", "something", "things"],
    ["things", "learning", "beautiful", "here", "fast"]
  ],
  "We": [
    ["We"],
    ["should", "must"],
    ["always", "never", "try"],
    ["keep", "forget", "to", "something"],
    ["going", "why", "understand", "new", "forward"]
  ],
  "It": [
    ["It"],
    ["seems", "was"],
    ["like", "very", "always"],
    ["a", "hard", "meant", "good"],
    ["dream", "to", "for", "enough", "idea"]
  ]
};

const rootWords = Object.keys(wordGroups);
let currentRoot = rootWords[0];
let levels = wordGroups[currentRoot];
let animating = false;

const board = document.getElementById('board');
const svg = document.getElementById('lines');
const ball = document.getElementById('ball');
const sentenceEl = document.getElementById('sentence');
const restartBtn = document.getElementById('restart');
const speedSlider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-val');
const picker = document.getElementById('word-picker');

let speed = 1;
speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed + 'x';
});

let nodeEls = [];
let lineEls = [];

function buildPicker() {
  picker.innerHTML = '';
  rootWords.forEach(w => {
    const item = document.createElement('div');
    item.className = 'picker-item' + (w === currentRoot ? ' selected' : '');
    item.textContent = w;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      picker.classList.remove('show');
      if (w !== currentRoot) {
        currentRoot = w;
        levels = wordGroups[currentRoot];
        build();
      }
    });
    picker.appendChild(item);
  });
}

function showPicker() {
  if (animating) return;
  buildPicker();
  const rootNode = nodeEls[0][0];
  const r = rootNode.getBoundingClientRect();
  const br = board.getBoundingClientRect();
  picker.style.left = (r.left - br.left + r.width / 2 - 40) + 'px';
  picker.style.top = (r.top - br.top + r.height + 8) + 'px';
  picker.classList.add('show');
}

document.addEventListener('click', (e) => {
  if (!picker.contains(e.target)) picker.classList.remove('show');
});

function build() {
  board.querySelectorAll('.row').forEach(r => r.remove());
  svg.innerHTML = '';
  nodeEls = [];
  lineEls = [];

  levels.forEach((words, lvl) => {
    const row = document.createElement('div');
    row.className = 'row';
    const rowNodes = [];
    words.forEach(w => {
      const node = document.createElement('div');
      node.className = 'node';
      node.textContent = w;
      const rng = document.createElement('span');
      rng.className = 'rng';
      node.appendChild(rng);
      row.appendChild(node);
      rowNodes.push(node);
    });
    board.appendChild(row);
    nodeEls.push(rowNodes);
  });

  // Make root clickable
  const rootNode = nodeEls[0][0];
  rootNode.classList.add('root');
  rootNode.addEventListener('click', (e) => {
    e.stopPropagation();
    showPicker();
  });

  requestAnimationFrame(() => {
    const boardRect = board.getBoundingClientRect();
    for (let lvl = 0; lvl < levels.length - 1; lvl++) {
      const lvlLines = [];
      for (let i = 0; i < nodeEls[lvl].length; i++) {
        const pRect = nodeEls[lvl][i].getBoundingClientRect();
        const px = pRect.left + pRect.width / 2 - boardRect.left;
        const py = pRect.top + pRect.height - boardRect.top;
        const makeL = (ci) => {
          const cRect = nodeEls[lvl + 1][ci].getBoundingClientRect();
          const cx = cRect.left + cRect.width / 2 - boardRect.left;
          const cy = cRect.top - boardRect.top;
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', px);
          line.setAttribute('y1', py);
          line.setAttribute('x2', cx);
          line.setAttribute('y2', cy);
          svg.appendChild(line);
          return line;
        };
        lvlLines.push({ left: makeL(i), right: makeL(i + 1) });
      }
      lineEls.push(lvlLines);
    }
    animate();
  });
}

function getCenter(el) {
  const r = el.getBoundingClientRect();
  const br = board.getBoundingClientRect();
  return { x: r.left + r.width / 2 - br.left, y: r.top + r.height / 2 - br.top };
}

function animateBall(from, to, duration) {
  return new Promise(resolve => {
    const start = performance.now();
    const fx = from.x - 7, fy = from.y - 7;
    const dx = to.x - 7 - fx, dy = to.y - 7 - fy;
    function tick(now) {
      let t = Math.min((now - start) / duration, 1);
      t = t * t;
      ball.style.left = (fx + dx * t) + 'px';
      ball.style.top = (fy + dy * t) + 'px';
      if (t < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

async function animate() {
  animating = true;
  ball.style.opacity = '0';
  sentenceEl.classList.remove('show');
  restartBtn.classList.remove('show');

  const path = [0];
  const randoms = [];
  for (let lvl = 0; lvl < levels.length - 1; lvl++) {
    const r = Math.random();
    randoms.push(r);
    path.push(r < 0.5 ? path[lvl] : path[lvl] + 1);
  }

  const root = nodeEls[0][0];
  root.classList.add('active');
  const rootC = getCenter(root);
  ball.style.left = (rootC.x - 7) + 'px';
  ball.style.top = (rootC.y - 7) + 'px';
  ball.style.opacity = '1';

  await delay(500 / speed);

  for (let lvl = 0; lvl < levels.length - 1; lvl++) {
    const parentIdx = path[lvl];
    const childIdx = path[lvl + 1];
    const r = randoms[lvl];
    const side = r < 0.5 ? 'left' : 'right';

    lineEls[lvl][parentIdx][side].classList.add('active');

    const target = getCenter(nodeEls[lvl + 1][childIdx]);
    await animateBall(getCenter(nodeEls[lvl][parentIdx]), target, 450 / speed);

    const childNode = nodeEls[lvl + 1][childIdx];
    childNode.classList.add('active');

    const rng = childNode.querySelector('.rng');
    rng.textContent = r.toFixed(2);
    rng.classList.add('show');

    await delay(400 / speed);
  }

  const words = path.map((idx, lvl) => levels[lvl][idx]);
  sentenceEl.textContent = '"' + words.join(' ') + '"';
  sentenceEl.classList.add('show');

  await delay(300 / speed);
  restartBtn.classList.add('show');
  animating = false;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function reset() {
  if (animating) return;
  nodeEls.flat().forEach(n => {
    n.classList.remove('active');
    const rng = n.querySelector('.rng');
    rng.classList.remove('show');
    rng.textContent = '';
  });
  lineEls.flat().forEach(l => { l.left.classList.remove('active'); l.right.classList.remove('active'); });
  ball.style.opacity = '0';
  sentenceEl.classList.remove('show');
  restartBtn.classList.remove('show');
  setTimeout(animate, 300);
}

restartBtn.addEventListener('click', reset);
build();
</script>
</body>
</html>
